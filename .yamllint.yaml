---
# yamllint configuration
# See https://yamllint.readthedocs.io/en/stable/configuration.html

extends: default

rules:
  # Line length - relaxed for readability, disabled for Taskfiles
  line-length:
    max: 120
    level: warning
    ignore: |
      Taskfile.yml
      */Taskfile.yml

ignore: |
  .venv/
  .git/
